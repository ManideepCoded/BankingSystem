<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bank</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🏦 MyBank</a>

        <div class="ms-auto">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-light me-2">Dashboard</a>
                <a href="{% url 'transfer' %}" class="btn btn-light me-2">Transfer</a>
                <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-light me-2">Login</a>
                <a href="{% url 'register' %}" class="btn btn-warning">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container mt-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

</body>
</html>
